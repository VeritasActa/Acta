name: Daily Truth Check

on:
  schedule:
    - cron: '15 0 * * *'  # 00:15 UTC daily (after midnight anchor runs)
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: verify
        run: node tools/verify.js --anchor https://veritasacta.com/api/anchor/latest
